<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CET-6 · 英语学习 · 签到</title>
<style>
  :root {
    --bg: #f5f7fa;
    --card: #ffffff;
    --primary: #5b6abf;
    --primary-light: #e8ebf8;
    --primary-dark: #3f4a8a;
    --accent: #f6a85b;
    --success: #4caf7d;
    --danger: #e57373;
    --text: #2d3748;
    --text-secondary: #718096;
    --border: #e2e8f0;
    --radius: 16px;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    padding: 20px;
  }
  .app { max-width: 560px; margin: 0 auto; }

  .header { text-align: center; padding: 22px 20px 14px; }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
  .header h1 span { color: var(--primary); }
  .header .sub { color: var(--text-secondary); font-size: 13px; margin-top: 2px; }
  .header .today { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
  .module-switcher { display: flex; gap: 6px; justify-content: center; margin: 10px 0 6px; }
  .module-switcher .module-btn { padding: 4px 14px; border: 1px solid var(--border); border-radius: 20px; background: var(--card); font-size: 13px; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; }
  .module-switcher .module-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px;
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tabs {
    display: flex;
    gap: 4px;
    background: var(--bg);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 14px;
  }
  .tabs button {
    flex: 1;
    padding: 10px 0;
    border: none;
    border-radius: 10px;
    background: transparent;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.25s;
  }
  .tabs button.active {
    background: var(--card);
    color: var(--primary);
    font-weight: 600;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .checkin-hero { text-align: center; padding: 20px 16px; }
  .checkin-btn {
    width: 88px; height: 88px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--primary), #7c8cdb);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(91,106,191,0.35);
    margin: 0 auto 14px;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }
  .checkin-btn:hover { transform: scale(1.05); }
  .checkin-btn:active { transform: scale(0.97); }
  .checkin-btn.done {
    background: linear-gradient(135deg, var(--success), #66d19a);
    box-shadow: 0 4px 20px rgba(76,175,125,0.35);
    cursor: default;
  }
  .checkin-btn.done:hover { transform: none; }
  .checkin-btn .big { font-size: 26px; line-height: 1; }
  .checkin-btn .small { font-size: 11px; font-weight: 400; opacity: 0.9; }
  .cta-text { color: var(--text-secondary); font-size: 13px; margin-top: 2px; }
  .cta-text strong { color: var(--primary); }

  .stats {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .stat-item { text-align: center; }
  .stat-num { font-size: 22px; font-weight: 700; color: var(--primary); }
  .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    text-align: center;
  }
  .cal-header { font-size: 12px; color: var(--text-secondary); font-weight: 500; padding: 3px 0; }
  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    border-radius: 8px;
    position: relative;
  }
  .cal-day.other { color: #ccc; }
  .cal-day.today { font-weight: 700; color: var(--primary); }
  .cal-day.checked::after {
    content: '';
    position: absolute;
    bottom: 2px;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--success);
  }
  .cal-day.today.checked::after { background: var(--primary); }
  .cal-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .cal-nav .month-label { font-size: 14px; font-weight: 600; }
  .cal-nav button {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-secondary);
    transition: all 0.2s;
  }
  .cal-nav button:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }

  .cal-header-toggle {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    padding: 2px 0 6px;
    user-select: none;
    font-size: 14px;
    font-weight: 600;
  }
  .cal-header-toggle:hover { opacity: 0.7; }
  .cal-header-toggle .icon { font-size: 16px; margin-right: 4px; }
  .cal-toggle-icon { font-size: 12px; color: var(--text-secondary); transition: transform 0.25s; }
  .cal-toggle-icon.collapsed { transform: rotate(-90deg); }
  #calBody.collapsed { display: none; }

  .daily-badge {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 6px;
  }
  .daily-badge .info { font-size: 13px; color: var(--text-secondary); }
  .daily-badge .day-tag {
    background: var(--primary-light);
    color: var(--primary);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  .daily-search {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 12px;
    outline: none;
    transition: border 0.2s;
  }
  .daily-search:focus { border-color: var(--primary); }

  .word-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    max-height: 520px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .word-grid::-webkit-scrollbar { width: 4px; }
  .word-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .speak-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 6px; transition: background 0.2s; }
  .speak-btn:hover { background: var(--primary-light); }
  .speak-all-btn { font-size: 12px; margin-left: auto; color: var(--primary); }
  .speak-mini { font-size: 12px; opacity: 0.5; }
  .speak-mini:hover { opacity: 1; }
  .word-chip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-radius: 10px;
    background: var(--bg);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    gap: 6px;
  }
  .word-chip:hover { background: var(--primary-light); }
  .word-chip .we { font-weight: 600; font-size: 14px; }
  .word-chip .cn-placeholder {
    font-size: 11px;
    color: #bbb;
  }
  .word-chip .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .word-chip .status-dot.new { background: #ddd; }
  .word-chip .status-dot.learning { background: var(--accent); }
  .word-chip .status-dot.known { background: var(--success); }

  /* Welcome Modal */
  .welcome-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .welcome-overlay.open { display: flex; }
  .welcome-box {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 24px;
    padding: 40px 36px 32px;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 25px 80px rgba(102,126,234,0.4);
    text-align: center;
    animation: welcomeIn 0.5s ease;
    position: relative;
    overflow: hidden;
  }
  .welcome-box::before {
    content: '';
    position: absolute; top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.08) 0%, transparent 60%);
    pointer-events: none;
  }
  @keyframes welcomeIn {
    0% { transform: scale(0.85) translateY(20px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }
  .welcome-box .w-icon { font-size: 52px; margin-bottom: 8px; display: block; }
  .welcome-box .w-title { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .welcome-box .w-sub { font-size: 14px; color: rgba(255,255,255,0.75); margin-bottom: 18px; line-height: 1.6; }
  .welcome-box .w-browsers { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
  .welcome-box .w-browsers span { padding: 5px 14px; border-radius: 20px; background: rgba(255,255,255,0.15); color: #fff; font-size: 13px; font-weight: 500; backdrop-filter: blur(4px); }
  .welcome-box .w-bar { height: 3px; border-radius: 2px; background: rgba(255,255,255,0.2); margin: 0 auto; max-width: 200px; overflow: hidden; }
  .welcome-box .w-bar-fill { height: 100%; width: 100%; background: #fff; border-radius: 2px; animation: barShrink 3s linear forwards; transform-origin: left; }
  @keyframes barShrink { from { transform: scaleX(1); } to { transform: scaleX(0); } }

  /* Word Detail Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 999;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--card);
    border-radius: 20px;
    padding: 32px 28px 24px;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    text-align: center;
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { transform: scale(0.92); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .modal-box .m-en { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .modal-box .m-cn { font-size: 18px; color: var(--primary); margin-bottom: 20px; }
  .modal-box .m-status {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 20px;
    padding: 6px 12px;
    border-radius: 8px;
    background: var(--bg);
    display: inline-block;
  }
  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .modal-actions button {
    padding: 10px 22px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 80px;
  }
  .modal-actions button:active { transform: scale(0.96); }
  .modal-actions .m-known { background: var(--success); color: #fff; }
  .modal-actions .m-learning { background: var(--accent); color: #fff; }
  .modal-actions .m-reset { background: var(--bg); color: var(--text-secondary); }
  .modal-actions .m-close { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }

  .words-footer {
    text-align: center;
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-secondary);
  }
  .words-footer .count { color: var(--primary); font-weight: 600; }

  .review-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-secondary);
    font-size: 14px;
  }
  .review-empty .big-icon { font-size: 48px; margin-bottom: 12px; }

  .flashcard-container { text-align: center; padding: 8px 0; }
  .flashcard-progress { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }
  .flashcard {
    background: var(--bg);
    border-radius: 16px;
    padding: 40px 24px;
    cursor: pointer;
    transition: all 0.3s;
    min-height: 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 2px solid transparent;
    user-select: none;
  }
  .flashcard:hover { border-color: var(--primary-light); }
  .flashcard .fc-en { font-size: 26px; font-weight: 700; }
  .flashcard .fc-cn {
    font-size: 18px;
    color: var(--primary);
    margin-top: 12px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .flashcard .fc-cn.show { opacity: 1; }
  .flashcard .fc-hint { font-size: 13px; color: var(--text-secondary); margin-top: 16px; }

  .fc-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 16px;
  }
  .fc-actions button {
    padding: 10px 28px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 100px;
  }
  .fc-actions button:active { transform: scale(0.96); }
  .fc-forgot { background: #fde8e8; color: var(--danger); }
  .fc-forgot:hover { background: #f8d0d0; }
  .fc-remember { background: #e8f5ee; color: var(--success); }
  .fc-remember:hover { background: #d0ebdf; }
  .fc-actions button:disabled { opacity: 0.4; cursor: default; }

  .review-summary {
    text-align: center;
    padding: 20px;
  }
  .review-summary .big-icon { font-size: 48px; margin-bottom: 8px; }
  .review-summary .summary-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .review-summary .summary-stats { display: flex; gap: 24px; justify-content: center; margin: 12px 0; }
  .review-summary .summary-stats div { text-align: center; }
  .review-summary .summary-stats .num { font-size: 20px; font-weight: 700; }
  .review-summary .summary-stats .num.green { color: var(--success); }
  .review-summary .summary-stats .num.red { color: var(--danger); }
  .review-summary   .summary-restart {
    margin-top: 12px;
    padding: 8px 24px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    cursor: pointer;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .review-focus-btn {
    margin-top: 6px;
    padding: 10px 24px;
    border: none;
    border-radius: 10px;
    background: var(--danger);
    color: #fff;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
  }
  .review-focus-btn:hover { opacity: 0.85; }
  .review-focus-btn:active { transform: scale(0.96); }
  .forgotten-list {
    margin-top: 14px;
    text-align: left;
    max-height: 240px;
    overflow-y: auto;
  }
  .forgotten-list::-webkit-scrollbar { width: 4px; }
  .forgotten-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .forgotten-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    border-radius: 8px;
    background: var(--bg);
    margin-bottom: 4px;
    font-size: 13px;
  }
  .forgotten-item .fe-en { font-weight: 600; }
  .forgotten-item .fe-cn { color: var(--text-secondary); font-size: 12px; }
  .forgotten-item .fe-bad { color: var(--danger); font-size: 11px; font-weight: 600; white-space: nowrap; }

  .quiz-area { padding: 12px 0 4px; }
  .quiz-area .q-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
  .quiz-area .q-word { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
  .quiz-options { display: flex; flex-direction: column; gap: 6px; }
  .quiz-options button {
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card);
    cursor: pointer;
    font-size: 14px;
    text-align: left;
    transition: all 0.2s;
  }
  .quiz-options button:hover { border-color: var(--primary); background: var(--primary-light); }
  .quiz-options button.correct { border-color: var(--success); background: #eafaf3; color: var(--success); font-weight: 600; }
  .quiz-options button.wrong { border-color: #e53e3e; background: #fff5f5; color: #e53e3e; }
  .quiz-result { margin-top: 8px; font-size: 14px; font-weight: 500; }
  .quiz-result.correct { color: var(--success); }
  .quiz-result.wrong { color: #e53e3e; }
  .quiz-next {
    margin-top: 8px;
    padding: 8px 20px;
    border: none;
    border-radius: 8px;
    background: var(--primary);
    color: #fff;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.2s;
  }
  .quiz-next:hover { background: var(--primary-dark); }

  /* Study History */
  .history-card { margin-bottom: 14px; }
  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  .history-header .hh-left { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .history-header .hh-icon { font-size: 12px; color: var(--text-secondary); transition: transform 0.25s; }
  .history-header .hh-icon.open { transform: rotate(90deg); }
  .history-body { margin-top: 12px; display: none; }
  .history-body.open { display: block; }
  .history-date-row {
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 6px;
    overflow: hidden;
  }
  .history-date-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.2s;
    user-select: none;
  }
  .history-date-header:hover { background: var(--primary-light); }
  .history-date-header .hd-day { font-weight: 600; }
  .history-date-header .hd-meta { color: var(--text-secondary); font-size: 12px; }
  .history-date-header .hd-arrow { font-size: 10px; color: #bbb; transition: transform 0.2s; }
  .history-date-header .hd-arrow.open { transform: rotate(90deg); }
  .history-words {
    display: none;
    padding: 4px 14px 10px;
    border-top: 1px solid var(--border);
  }
  .history-words.open { display: block; }
  .history-word-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 4px;
    font-size: 13px;
    border-bottom: 1px solid #f0f0f0;
  }
  .history-word-item:last-child { border-bottom: none; }
  .hw-en { font-weight: 600; }
  .hw-cn { color: var(--text-secondary); font-size: 12px; }
  .hw-err { color: var(--danger); font-size: 11px; font-weight: 600; white-space: nowrap; }
  .history-empty {
    text-align: center;
    padding: 30px 0;
    color: var(--text-secondary);
    font-size: 13px;
  }

  /* Data Management */
  .data-mgr {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .data-mgr button {
    flex: 1;
    min-width: 80px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    cursor: pointer;
    font-size: 12px;
    color: var(--text-secondary);
    transition: all 0.2s;
  }
  .data-mgr button:hover { border-color: var(--primary); color: var(--primary); }
  .data-mgr .hint {
    width: 100%;
    font-size: 11px;
    color: #aaa;
    padding: 4px 2px;
  }

  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    background: var(--card);
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    transition: transform 0.4s ease;
    z-index: 1000;
    pointer-events: none;
    border: 1px solid var(--border);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--success); color: var(--success); }
  .toast.info { border-color: var(--primary); color: var(--primary); }

  @media (max-width: 420px) {
    body { padding: 12px; }
    .card { padding: 16px; }
    .checkin-btn { width: 76px; height: 76px; font-size: 14px; }
    .checkin-btn .big { font-size: 22px; }
    .stats { gap: 20px; }
    .word-grid { grid-template-columns: 1fr; max-height: 400px; }
    .flashcard .fc-en { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="app" id="app">

  <div id="mainApp">

    <div class="header">

<script src="cet4_words.js"></script>
<script src="cet6_words.js"></script>
<script src="ky_words.js"></script>
<script>
const WORDS_PER_DAY = 100;
const WEEKDAYS = ['日', '一', '二', '三', '四', '五', '六'];

const MODULES = {
  cet4: { name: 'CET-4', label: '大学英语四级 · 每日 100 词', key: 'eng_learn_cet4' },
  cet6: { name: 'CET-6', label: '大学英语六级 · 每日 100 词', key: 'eng_learn_cet6' },
  ky: { name: '考研英语', label: '全国硕士研究生英语 · 每日 100 词', key: 'eng_learn_ky' },
};
function loadVocab(mod) {
  if (mod === 'cet4' && typeof WORDS_DATA_CET4 !== 'undefined') return WORDS_DATA_CET4;
  if (mod === 'cet6' && typeof WORDS_DATA_CET6 !== 'undefined') return WORDS_DATA_CET6;
  if (mod === 'ky' && typeof WORDS_DATA_KY !== 'undefined') return WORDS_DATA_KY;
  return [];
}
let currentModule = 'cet6';
let VOCABULARY = [];
let state = { checkins: [], favorites: [], wordStatus: {}, reviewMistakes: {} };
let displayMonth = null;
let currentTab = 'learn';
let reviewState = { pool: [], idx: 0, flipped: false, remembered: 0, forgotten: 0, sessionForgotten: [], done: false };
let quizState = { word: null, options: [], answered: false, pool: [] };

// ======================== STORAGE ========================

function loadModulePref() {
  try { return localStorage.getItem('eng_learn_module') || 'cet6'; } catch(e) { return 'cet6'; }
}
function saveModulePref() {
  try { localStorage.setItem('eng_learn_module', currentModule); } catch(e) {}
}
function loadState() {
  try {
    const raw = localStorage.getItem(MODULES[currentModule].key);
    if (raw) {
      const d = JSON.parse(raw);
      state.checkins = d.checkins || [];
      state.favorites = d.favorites || [];
      state.wordStatus = d.wordStatus || {};
      state.reviewMistakes = d.reviewMistakes || {};
      state.calCollapsed = d.calCollapsed || false;
      return;
    }
  } catch (e) {}
  state.checkins = [];
  state.favorites = [];
  state.wordStatus = {};
  state.calCollapsed = false;
}

function saveState() {
  const data = {
    checkins: state.checkins,
    favorites: state.favorites,
    wordStatus: state.wordStatus,
    reviewMistakes: state.reviewMistakes,
    calCollapsed: state.calCollapsed
  };
  localStorage.setItem(MODULES[currentModule].key, JSON.stringify(data));
}

function toggleCalendar() {
  state.calCollapsed = !state.calCollapsed;
  saveState();
  applyCalCollapse();
}

function applyCalCollapse() {
  const body = document.getElementById('calBody');
  const icon = document.getElementById('calToggle');
  if (!body || !icon) return;
  if (state.calCollapsed) {
    body.classList.add('collapsed');
    icon.classList.add('collapsed');
  } else {
    body.classList.remove('collapsed');
    icon.classList.remove('collapsed');
  }
}

// ======================== EXPORT / IMPORT ========================

// ======================== STUDY HISTORY ========================

var historyOpen = false;

function toggleHistory() {
  historyOpen = !historyOpen;
  document.getElementById('historyBody').classList.toggle('open', historyOpen);
  document.getElementById('historyIcon').classList.toggle('open', historyOpen);
  if (historyOpen) renderHistory();
}

function getBatchForDay(dayIndex) {
  var total = VOCABULARY.length;
  if (total === 0) return [];
  var start = (dayIndex * WORDS_PER_DAY) % total;
  var batch = [];
  for (var i = 0; i < WORDS_PER_DAY; i++) {
    batch.push(VOCABULARY[(start + i) % total]);
  }
  return batch;
}

function renderHistory() {
  var container = document.getElementById('historyContent');
  if (state.checkins.length === 0) {
    container.innerHTML = '<div class="history-empty">还没有签到记录</div>';
    return;
  }
  var html = '';
  for (var ci = state.checkins.length - 1; ci >= 0; ci--) {
    var dateStr = state.checkins[ci];
    var batch = getBatchForDay(ci + 1);
    var dayLabel = '第 ' + (ci + 1) + ' 天';
    html += '<div class="history-date-row">'
      + '<div class="history-date-header" onclick="toggleHistoryDate(this)">'
      + '<span><span class="hd-day">' + dateStr + '</span> <span class="hd-meta">' + dayLabel + '</span></span>'
      + '<span><span class="hd-meta">' + batch.length + ' 词</span> <span class="hd-arrow">▶</span></span>'
      + '</div>'
      + '<div class="history-words">';
    for (var wi = 0; wi < batch.length; wi++) {
      var w = batch[wi];
      var errCount = state.reviewMistakes[w.en] || 0;
      var status = state.wordStatus[w.en];
      if (!status) {
        // Word not interacted with - skip or show dimmed
        html += '<div class="history-word-item" style="opacity:0.4;">'
          + '<div><span class="hw-en">' + w.en + '</span> <span class="hw-cn">' + w.cn + '</span></div>'
          + '<span class="hw-err" style="color:#ccc;">未学</span>'
          + '</div>';
      } else {
        html += '<div class="history-word-item">'
          + '<div><span class="hw-en">' + w.en + '</span> <span class="hw-cn">' + w.cn + '</span></div>'
          + '<span class="hw-err">' + (errCount > 0 ? '错 ' + errCount + ' 次' : '✓') + '</span>'
          + '</div>';
      }
    }
    html += '</div></div>';
  }
  container.innerHTML = html;
}

function toggleHistoryDate(el) {
  var words = el.nextElementSibling;
  var arrow = el.querySelector('.hd-arrow');
  words.classList.toggle('open');
  arrow.classList.toggle('open');
}

function exportData() {
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    checkins: state.checkins,
    favorites: state.favorites,
    wordStatus: state.wordStatus,
    reviewMistakes: state.reviewMistakes,
    calCollapsed: state.calCollapsed
  };
  const content = JSON.stringify(data, null, 2);
  const today = getTodayStr();
  const defaultName = 'english_learn_data_' + today + '.json';

  // Use File System Access API (Chromium) for custom save location
  if ('showSaveFilePicker' in window) {
    const opts = {
      suggestedName: defaultName,
      types: [{ description: 'JSON 数据文件', accept: { 'application/json': ['.json'] } }]
    };
    window.showSaveFilePicker(opts).then(function(handle) {
      handle.createWritable().then(function(writable) {
        writable.write(content).then(function() {
          writable.close();
          showToast('数据已保存 ✅', 'success');
        });
      });
    }).catch(function(err) {
      if (err.name !== 'AbortError') {
        // Fallback if user doesn't pick or error
        fallbackDownload(content, defaultName);
      }
    });
  } else {
    fallbackDownload(content, defaultName);
  }
}

function fallbackDownload(content, name) {
  const blob = new Blob([content], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.download = name;
  a.href = url;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('文件已下载，请手动移动到目标文件夹 📁', 'success');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.checkins) throw new Error('无效的数据文件');
      state.checkins = data.checkins || [];
      state.favorites = data.favorites || [];
      state.wordStatus = data.wordStatus || {};
      state.reviewMistakes = data.reviewMistakes || {};
      state.calCollapsed = data.calCollapsed || false;
      saveState();
      refreshAll();
      showToast('数据导入成功！✅', 'success');
    } catch (err) {
      showToast('导入失败：文件格式不正确 ❌', 'info');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function refreshAll() {
  applyCalCollapse();
  updateCheckinUI();
  renderCalendar();
  updateDailyBadge();
  renderDailyWords();
  renderReview();
  initQuiz();
}

// ======================== HELPERS ========================

function getTodayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

function getDayNumber() {
  return state.checkins.length;
}

function getTodayBatch() {
  const total = VOCABULARY.length;
  if (total === 0) return [];
  const day = getDayNumber();
  let start = (day * WORDS_PER_DAY) % total;
  const batch = [];
  for (let i = 0; i < WORDS_PER_DAY; i++) {
    batch.push(VOCABULARY[(start + i) % total]);
  }
  return batch;
}

// ======================== CHECK-IN ========================

function isCheckedIn() {
  return state.checkins.includes(getTodayStr());
}

function calcStreak() {
  if (state.checkins.length === 0) return 0;
  const sorted = state.checkins.slice().sort().reverse();
  let streak = 0;
  let checkDate = new Date();
  if (sorted[0] !== getTodayStr()) {
    checkDate.setDate(checkDate.getDate() - 1);
  }
  for (let i = 0; i < sorted.length; i++) {
    const y = checkDate.getFullYear();
    const m = String(checkDate.getMonth() + 1).padStart(2, '0');
    const d = String(checkDate.getDate()).padStart(2, '0');
    const expected = y + '-' + m + '-' + d;
    if (sorted[i] === expected) {
      streak++;
      checkDate.setDate(checkDate.getDate() - 1);
    } else break;
  }
  return streak;
}

function doCheckin() {
  if (isCheckedIn()) { showToast('今天已经签到啦！🎉', 'info'); return; }
  state.checkins.push(getTodayStr());
  saveState();
  updateCheckinUI();
  renderCalendar();
  updateDailyBadge();
  renderDailyWords();
  showToast('签到成功！继续加油 💪', 'success');
}

function updateCheckinUI() {
  const btn = document.getElementById('checkinBtn');
  const icon = document.getElementById('checkinIcon');
  const label = document.getElementById('checkinLabel');
  const cta = document.getElementById('checkinCta');
  const streak = document.getElementById('streakNum');
  const total = document.getElementById('totalNum');

  const done = isCheckedIn();
  btn.className = 'checkin-btn' + (done ? ' done' : '');
  icon.textContent = done ? '✅' : '✓';
  label.textContent = done ? '已签到' : '签到';
  cta.innerHTML = done
    ? '今日已签到，继续学习今日词汇吧 📖'
    : '今天还没有签到，<strong>点击签到</strong>开始学习吧！';
  streak.textContent = calcStreak();
  total.textContent = state.checkins.length;

  const knownCount = Object.values(state.wordStatus).filter(function(s) { return s === 'known'; }).length;
  document.getElementById('wordProgress').textContent = knownCount + '/' + VOCABULARY.length;
}

// ======================== CALENDAR ========================

function renderCalendar() {
  const now = new Date();
  const year = displayMonth ? displayMonth.year : now.getFullYear();
  const month = displayMonth !== null ? displayMonth.month : now.getMonth();
  document.getElementById('monthLabel').textContent = year + '年' + (month + 1) + '月';

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = getTodayStr();

  let html = WEEKDAYS.map(function(d) { return '<div class="cal-header">' + d + '</div>'; }).join('');
  for (let i = 0; i < firstDay; i++) html += '<div class="cal-day other"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
    let cls = 'cal-day';
    if (ds === todayStr) cls += ' today';
    if (state.checkins.includes(ds)) cls += ' checked';
    html += '<div class="' + cls + '">' + d + '</div>';
  }
  document.getElementById('calendar').innerHTML = html;
}

function changeMonth(delta) {
  const now = new Date();
  let y = displayMonth ? displayMonth.year : now.getFullYear();
  let m = displayMonth !== null ? displayMonth.month : now.getMonth();
  m += delta;
  if (m < 0) { m = 11; y--; }
  if (m > 11) { m = 0; y++; }
  displayMonth = { year: y, month: m };
  renderCalendar();
}

// ======================== DAILY WORDS ========================

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.9;
  window.speechSynthesis.speak(u);
}

function speakAllDaily() {
  const batch = getTodayBatch();
  if (batch.length === 0) { showToast('今日无单词', 'info'); return; }
  let i = 0;
  speak(batch[i].en);
  const timer = setInterval(function() {
    i++;
    if (i >= batch.length) { clearInterval(timer); return; }
    speak(batch[i].en);
  }, 1800);
  showToast('朗读中 (' + batch.length + ' 词)', 'info');
}

function updateDailyBadge() {
  const day = getDayNumber() + 1;
  document.getElementById('dayTag').textContent = '第 ' + day + ' 天';
  document.getElementById('dailyInfo').textContent = '今日 ' + WORDS_PER_DAY + ' 词 · 已签到 ' + getDayNumber() + ' 天';
}

function renderDailyWords() {
  const batch = getTodayBatch();
  const search = document.getElementById('dailySearch').value.toLowerCase().trim();
  let filtered = batch;
  if (search) {
    filtered = batch.filter(function(w) {
      return w.en.toLowerCase().includes(search) || w.cn.includes(search);
    });
  }

  const container = document.getElementById('dailyWords');
  document.getElementById('shownCount').textContent = filtered.length;

  container.innerHTML = filtered.map(function(w) {
    const status = state.wordStatus[w.en] || 'new';
    const dotClass = status === 'known' ? 'known' : status === 'learning' ? 'learning' : 'new';
    const enSafe = w.en.replace(/'/g, "\\'");
    return '<div class="word-chip" onclick="openWordModal(\'' + enSafe + '\')">'
      + '<span class="we">' + w.en + '</span>'
      + '<span style="display:flex;align-items:center;gap:6px;">'
      + '<button class="speak-btn speak-mini" onclick="event.stopPropagation();speak(\'' + enSafe + '\')" title="朗读">🔊</button>'
      + '<span class="cn-placeholder">查看释义 →</span>'
      + '<span class="status-dot ' + dotClass + '"></span>'
      + '</span></div>';
  }).join('');
}

var modalWord = null;

function openWordModal(en) {
  modalWord = VOCABULARY.find(function(w) { return w.en === en; });
  if (!modalWord) return;
  document.getElementById('mEn').textContent = modalWord.en;
  document.getElementById('mCn').textContent = modalWord.cn;
  var status = state.wordStatus[modalWord.en] || 'new';
  var labels = { 'new': '🆕 新单词', 'learning': '📖 学习中', 'known': '✅ 已掌握' };
  document.getElementById('mStatus').textContent = labels[status] || '新单词';
  document.getElementById('wordModal').classList.add('open');
  // Auto-mark as learning when opened
  if (status === 'new') {
    state.wordStatus[modalWord.en] = 'learning';
    saveState();
    renderDailyWords();
    updateCheckinUI();
    document.getElementById('mStatus').textContent = '📖 学习中';
  }
}

function markModal(status) {
  if (!modalWord) return;
  state.wordStatus[modalWord.en] = status;
  saveState();
  renderDailyWords();
  updateCheckinUI();
  var labels = { 'learning': '📖 学习中', 'known': '✅ 已掌握' };
  document.getElementById('mStatus').textContent = labels[status] || '新单词';
  showToast(status === 'known' ? '已标记为已掌握 🎉' : '继续学习 💪', 'info');
}

function closeModal(ev) {
  if (ev && ev.target !== document.getElementById('wordModal')) return;
  document.getElementById('wordModal').classList.remove('open');
}

// ======================== REVIEW ========================

function buildReviewPool() {
  const entries = Object.entries(state.wordStatus);
  const knownWords = [];
  for (let i = 0; i < entries.length; i++) {
    const en = entries[i][0];
    const status = entries[i][1];
    if (status === 'known' || status === 'learning') {
      const found = VOCABULARY.find(function(w) { return w.en === en; });
      if (found) knownWords.push(found);
    }
  }
  return knownWords.sort(function() { return Math.random() - 0.5; });
}

function renderReview(focusPool) {
  const container = document.getElementById('reviewContent');
  var pool;
  if (focusPool) {
    pool = focusPool;
  } else {
    pool = buildReviewPool();
  }

  if (pool.length === 0) {
    container.innerHTML = '<div class="review-empty">'
      + '<div class="big-icon">📝</div>'
      + '<div>还没有已学单词，先去今日学习看看吧！</div>'
      + '<div style="font-size:12px;margin-top:8px;color:#aaa;">点击今日学习中的单词可标记为学习中</div>'
      + '</div>';
    return;
  }

  reviewState.pool = pool;
  reviewState.idx = 0;
  reviewState.flipped = false;
  reviewState.remembered = 0;
  reviewState.forgotten = 0;
  reviewState.sessionForgotten = [];
  reviewState.done = false;
  showFlashcard();
}

function showFlashcard() {
  const container = document.getElementById('reviewContent');
  const pool = reviewState.pool;
  const idx = reviewState.idx;
  const done = reviewState.done;

  if (done) {
    const total = reviewState.remembered + reviewState.forgotten;
    const pct = total ? Math.round(reviewState.remembered / total * 100) : 0;
    var focusHtml = '';
    var sf = reviewState.sessionForgotten;
    if (sf.length > 0) {
      focusHtml = '<div class="forgotten-list">';
      for (var fi = 0; fi < sf.length; fi++) {
        var fw = sf[fi];
        var badCount = state.reviewMistakes[fw.en] || 1;
        focusHtml += '<div class="forgotten-item">'
          + '<div><span class="fe-en">' + fw.en + '</span> <span class="fe-cn">' + fw.cn + '</span></div>'
          + '<span class="fe-bad">错 ' + badCount + ' 次</span>'
          + '</div>';
      }
      focusHtml += '</div>'
        + '<button class="review-focus-btn" onclick="renderReview('
        + '[' + sf.map(function(f) { return 'VOCABULARY.find(function(w){return w.en===\'' + f.en.replace(/'/g, "\\'") + '\'})'; }).join(',') + ']'
        + ')">重点复习这 ' + sf.length + ' 个</button>';
    }
    container.innerHTML = '<div class="review-summary">'
      + '<div class="big-icon">🎉</div>'
      + '<div class="summary-title">复习完成！</div>'
      + '<div class="summary-stats">'
      + '<div><div class="num green">' + reviewState.remembered + '</div><div style="font-size:12px;color:var(--text-secondary);">记得</div></div>'
      + '<div><div class="num red">' + reviewState.forgotten + '</div><div style="font-size:12px;color:var(--text-secondary);">需复习</div></div>'
      + '</div>'
      + '<div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px;">正确率 ' + pct + '%</div>'
      + focusHtml
      + '<button class="summary-restart" onclick="renderReview()" style="margin-top:' + (sf.length > 0 ? '8px' : '0') + ';">再来一轮</button>'
      + '</div>';
    return;
  }

  if (idx >= pool.length) {
    reviewState.done = true;
    showFlashcard();
    return;
  }

  const word = pool[idx];
  reviewState.flipped = false;

  container.innerHTML = '<div class="flashcard-container">'
    + '<div class="flashcard-progress">' + (idx + 1) + ' / ' + pool.length + '</div>'
    + '<div class="flashcard" onclick="flipFlashcard()">'
    + '<div class="fc-en">' + word.en + ' <button class="speak-btn" onclick="event.stopPropagation();speak(\'' + word.en.replace(/'/g, "\\'") + '\')" title="朗读">🔊</button></div>'
    + '<div class="fc-cn" id="fcCn">' + word.cn + '</div>'
    + '<div class="fc-hint" id="fcHint">点击翻转</div>'
    + '</div>'
    + '<div class="fc-actions">'
    + '<button class="fc-forgot" id="fcForgot" onclick="reviewAnswer(false)" disabled>忘了</button>'
    + '<button class="fc-remember" id="fcRemember" onclick="reviewAnswer(true)" disabled>记得</button>'
    + '</div></div>';
}

function flipFlashcard() {
  if (reviewState.done) return;
  reviewState.flipped = true;
  document.getElementById('fcCn').classList.add('show');
  document.getElementById('fcHint').textContent = '';
  document.getElementById('fcForgot').disabled = false;
  document.getElementById('fcRemember').disabled = false;
}

function reviewAnswer(remembered) {
  if (!reviewState.flipped) return;
  const word = reviewState.pool[reviewState.idx];
  if (word) {
    state.wordStatus[word.en] = remembered ? 'known' : 'learning';
  }
  if (remembered) {
    reviewState.remembered++;
  } else {
    reviewState.forgotten++;
    reviewState.sessionForgotten.push(word);
    state.reviewMistakes[word.en] = (state.reviewMistakes[word.en] || 0) + 1;
  }
  saveState();
  reviewState.idx++;
  updateCheckinUI();
  showFlashcard();
}

// ======================== QUIZ ========================

function initQuiz() {
  quizState.pool = VOCABULARY.length > 0 ? VOCABULARY.slice() : [];
  quizState.answered = false;
  nextQuiz();
}

function nextQuiz() {
  if (quizState.pool.length === 0) {
    quizState.pool = VOCABULARY.length > 0 ? VOCABULARY.slice() : [];
  }
  if (quizState.pool.length === 0) return;
  const idx = Math.floor(Math.random() * quizState.pool.length);
  const correct = quizState.pool.splice(idx, 1)[0];
  quizState.word = correct;
  quizState.answered = false;

  let wrongPool = VOCABULARY.filter(function(w) { return w.en !== correct.en; });
  const shuffled = wrongPool.sort(function() { return Math.random() - 0.5; }).slice(0, 3);
  const options = [
    { text: correct.cn, correct: true },
    { text: shuffled[0].cn, correct: false },
    { text: shuffled[1].cn, correct: false },
    { text: shuffled[2].cn, correct: false }
  ].sort(function() { return Math.random() - 0.5; });
  quizState.options = options;

  document.getElementById('quizWord').textContent = correct.en;
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizResult').className = 'quiz-result';
  document.getElementById('quizNext').style.display = 'none';

  const container = document.getElementById('quizOptions');
  container.innerHTML = options.map(function(opt, i) {
    return '<button data-idx="' + i + '" onclick="answerQuiz(' + i + ')">' + opt.text + '</button>';
  }).join('');
}

function answerQuiz(idx) {
  if (quizState.answered) return;
  quizState.answered = true;
  const correct = quizState.options.find(function(o) { return o.correct; });
  const correctIdx = quizState.options.indexOf(correct);
  const buttons = document.querySelectorAll('#quizOptions button');
  const result = document.getElementById('quizResult');

  buttons.forEach(function(b) { b.style.pointerEvents = 'none'; });
  for (let i = 0; i < buttons.length; i++) {
    if (i === correctIdx) buttons[i].classList.add('correct');
    if (i === idx && idx !== correctIdx) buttons[i].classList.add('wrong');
  }

  if (quizState.options[idx].correct) {
    result.textContent = '回答正确！';
    result.className = 'quiz-result correct';
  } else {
    result.textContent = '正确答案是：' + correct.text;
    result.className = 'quiz-result wrong';
  }
  document.getElementById('quizNext').style.display = 'inline-block';
}

// ======================== TABS ========================

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tabs button').forEach(function(b) {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  document.querySelectorAll('.tab-content').forEach(function(el) {
    el.classList.toggle('active', el.id === 'tab-' + tab);
  });
  if (tab === 'review') renderReview();
  if (tab === 'quiz') initQuiz();
}

// ======================== TOAST ========================

let toastTimer = null;
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2200);
}

// ======================== INIT ========================

function switchModule(mod) {
  if (mod === currentModule) return;
  saveState();
  currentModule = mod;
  saveModulePref();
  VOCABULARY = loadVocab(mod);
  if (!Array.isArray(VOCABULARY) || VOCABULARY.length === 0) {
    showToast('词库加载失败: ' + MODULES[mod].name, 'info');
    return;
  }
  state = { checkins: [], favorites: [], wordStatus: {}, reviewMistakes: {} };
  loadState();
  document.getElementById('moduleTitle').textContent = MODULES[mod].name;
  document.getElementById('moduleSub').textContent = MODULES[mod].label;
  document.querySelectorAll('#moduleSwitcher .module-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.module === mod);
  });
  refreshAll();
  showToast('已切换到 ' + MODULES[mod].name, 'success');
}

function showWelcome() {
  if (localStorage.getItem('eng_learn_welcomed')) return;
  localStorage.setItem('eng_learn_welcomed', '1');
  var el = document.getElementById('welcomeModal');
  el.classList.add('open');
  setTimeout(function() { el.classList.remove('open'); }, 3000);
}

function init() {
  currentModule = loadModulePref();
  VOCABULARY = loadVocab(currentModule);
  if (!Array.isArray(VOCABULARY) || VOCABULARY.length === 0) {
    document.body.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#e57373;">'
      + '<div><span style="font-size:48px;">⚠️</span></div>'
      + '<div style="font-size:16px;font-weight:600;margin-top:12px;">词库加载失败</div>'
      + '<div style="font-size:13px;margin-top:6px;color:var(--text-secondary);">请确认词库文件存在</div>'
      + '</div>';
    return;
  }
  loadState();
  showWelcome();
  document.getElementById('moduleTitle').textContent = MODULES[currentModule].name;
  document.getElementById('moduleSub').textContent = MODULES[currentModule].label;
  document.querySelectorAll('#moduleSwitcher .module-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.module === currentModule);
  });

  applyCalCollapse();
  const now = new Date();
  document.getElementById('headerDate').textContent =
    now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日 星期' + WEEKDAYS[now.getDay()];

  updateCheckinUI();
  renderCalendar();
  updateDailyBadge();
  renderDailyWords();
  renderReview();
  initQuiz();
}

init();
</script>
